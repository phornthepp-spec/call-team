version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: trading-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trading-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: trading-backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/trading
      SECRET_KEY: dev-secret-key-change-in-production
      MT5_SIMULATION_MODE: "true"
    networks:
      - trading-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: trading-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - trading-network
    restart: unless-stopped

networks:
  trading-network:
    driver: bridge

volumes:
  postgres_data:
